<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array</title>
</head>
<body>
    <h2>Cadastro de nomes</h2>

    <input type="text" id="nome" placeholder="Digite um nome">
    <button onclick="adicionar()">Cadastrar</button>
    <button onclick="Mostrar()">Mostrar lista</button>

    <p id="resultado"></p>

    <script>
        let nomes = []; 
        function adicionar (){
            let nome = document.getElementById("").value;
            if(nome !=""){
                nomes.push(nome);
                document.getelementbyid("nome").value ="";
            }
        }

        function mostrar(){
            let texto = "Nomes Cadastrados: <br>";
            for(let i=0; i<nomes.lnght; i++){
                texto += nomes [i] + "<br>";

            }
            document.getelementbyid("resultado").innerHTML = texto;
        }

    </script>

</body>
</html>
